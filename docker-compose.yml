services:
  frontend:
      build:
        context: ./studio/frontend
        dockerfile: Dockerfile
      container_name: guardflow_studio_ui
      ports:
        - "3000:3000"
      volumes:
        - ./studio/frontend:/app
        - frontend_node_modules:/app/node_modules
      environment:
        - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
      depends_on:
        - studio
  studio_db:
    image: postgres:15-alpine
    container_name: guardflow_studio_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - studio_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  studio:
    build: ./studio/backend 
    container_name: guardflow_studio_api
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@studio_db:5432/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./studio/backend:/app
    depends_on:
      studio_db:
        condition: service_healthy 

  redis:
    image: redis:7-alpine
    container_name: guardflow_cache
    ports:
      - "6379:6379"

volumes:
  studio_data:
  frontend_node_modules:
