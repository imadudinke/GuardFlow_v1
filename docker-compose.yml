services:
  studio_db:
    image: postgres:15-alpine
    container_name: guardflow_studio_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - studio_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  studio:
    build: ./studio/backend 
    container_name: guardflow_studio_api
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@studio_db:5432/${DB_NAME}
    volumes:
      - ./studio/backend:/app
    depends_on:
      studio_db:
        condition: service_healthy 

volumes:
  studio_data:
